interface:
  display_name: GG → Chooseable Options → Decision Menus
  short_description: Compact next-step router and option presenter
  icon_small: ./assets/icon-small.svg
  icon_large: ./assets/icon-large.png
  brand_color: '#22C55E'
  default_prompt: >-
    Use when the user asks what to do next, wants chooseable options, or needs a context-aware menu
    of next actions. Normalize the scenario, consult the routing matrix and skill indexes, and
    recommend the best route without replacing deeper workflows. Reference
    chooseable-options/SKILL.md when cross-referencing this skill.
